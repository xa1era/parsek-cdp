name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-client:
    name: publish parsek-cdp (client)
    runs-on: ubuntu-latest
    environment: pypi-client
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build twine
      - run: python -m build packages/client --outdir dist
      - run: python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-server:
    name: publish parsek-cdp-server
    needs: publish-client
    runs-on: ubuntu-latest
    environment: pypi-server
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build twine
      - run: python -m build packages/server --outdir dist
      - run: python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist